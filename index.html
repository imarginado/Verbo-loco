<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
<title>LOCOVERB — Javi's English Gym</title>
<meta name="theme-color" content="#16131f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Locoverb">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16131f;        /* deep violet-black */
  --panel:#201c2e;
  --panel2:#2a2440;
  --paper:#f2eee6;      /* warm off-white text */
  --dim:#9b93b3;
  --yellow:#ffd23f;     /* primary accent — riso yellow */
  --mint:#3ddc97;       /* correct */
  --coral:#ff5c6c;      /* wrong */
  --cyan:#5cc8ff;
  --radius:18px;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --display:'Archivo Black','Arial Black',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  -webkit-text-size-adjust:100%;
  touch-action:manipulation;
  background-image:radial-gradient(circle at 15% 10%, #241e38 0%, transparent 45%),
                   radial-gradient(circle at 85% 90%, #1d1830 0%, transparent 40%);
}
#app{max-width:760px;margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom))}
.filled{color:var(--mint);font-family:var(--mono);font-weight:700;border-bottom:2px solid var(--mint);padding:0 5px;white-space:nowrap}

/* ---------- header ---------- */
header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.logo{font-family:var(--display);font-size:clamp(30px,6vw,44px);line-height:.95;letter-spacing:-1px}
.logo em{font-style:normal;color:var(--yellow)}
.logo small{display:block;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--dim);margin-top:6px;font-weight:400}
.hud{display:flex;gap:10px;font-family:var(--mono);font-size:12px}
.hud .chip{background:var(--panel);border:1px solid #352e4e;border-radius:999px;padding:7px 13px}
.hud .chip b{color:var(--yellow)}

/* ---------- cards / home ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.mode{
  background:var(--panel);border:1px solid #352e4e;border-radius:var(--radius);
  padding:18px;cursor:pointer;text-align:left;color:var(--paper);font-family:var(--body);
  transition:transform .12s ease, border-color .12s ease;position:relative;overflow:hidden;
}
.mode:hover,.mode:focus-visible{transform:translateY(-3px);border-color:var(--yellow)}
.mode:focus-visible{outline:2px solid var(--yellow);outline-offset:2px}
.mode h2{font-family:var(--display);font-size:19px;margin-bottom:6px}
.mode p{color:var(--dim);font-size:13px;line-height:1.45;margin-bottom:12px}
.mode .due{font-family:var(--mono);font-size:11px;letter-spacing:1px}
.mode .due b{color:var(--coral)}
.mode .due i{color:var(--cyan);font-style:normal}
.mode .stamp{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:10px;
  border:1.5px solid var(--yellow);color:var(--yellow);border-radius:6px;padding:3px 7px;
  transform:rotate(6deg);letter-spacing:1px}
.mode.red{border-color:#5e2a3a}
.mode.red:hover{border-color:var(--coral)}
.mode.red .stamp{border-color:var(--coral);color:var(--coral)}

.row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{
  font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.5px;
  background:var(--yellow);color:#16131f;border:none;border-radius:12px;
  padding:13px 20px;cursor:pointer;transition:transform .1s ease;
}
.btn:hover{transform:translateY(-2px)}
.btn:focus-visible{outline:2px solid var(--paper);outline-offset:2px}
.btn.ghost{background:transparent;color:var(--paper);border:1px solid #4a4168}
.btn.small{padding:8px 14px;font-size:12px}

/* ---------- play screen ---------- */
.bar{height:8px;background:var(--panel);border-radius:99px;overflow:hidden;margin:8px 0 20px}
.bar>div{height:100%;background:linear-gradient(90deg,var(--yellow),var(--mint));width:0%;transition:width .3s ease}
.qcard{
  background:var(--panel);border:1px solid #352e4e;border-radius:var(--radius);
  padding:26px 22px;animation:pop .18s ease;
}
@keyframes pop{from{transform:scale(.98);opacity:.6}to{transform:scale(1);opacity:1}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
.qtag{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.qtext{font-size:21px;font-weight:600;line-height:1.45;margin-bottom:6px}
.qtext .blank{color:var(--yellow);font-family:var(--mono)}
.qhint{color:var(--dim);font-size:13px;margin-bottom:18px;font-style:italic}
.opts{display:grid;gap:10px}
.opt{
  background:var(--panel2);border:1px solid #3b3357;border-radius:12px;color:var(--paper);
  padding:14px 16px;text-align:left;font-size:16px;font-family:var(--body);cursor:pointer;
  display:flex;gap:12px;align-items:center;transition:border-color .1s;
}
.opt:hover{border-color:var(--yellow)}
.opt:focus-visible{outline:2px solid var(--yellow);outline-offset:1px}
.opt kbd{font-family:var(--mono);font-size:11px;background:#16131f;border-radius:6px;padding:3px 7px;color:var(--dim)}
.opt.right{border-color:var(--mint);background:#1d3a2e}
.opt.wrong{border-color:var(--coral);background:#3a1d26}
.opt:disabled{cursor:default;opacity:.85}
input.answer{
  width:100%;background:var(--panel2);border:1px solid #3b3357;border-radius:12px;
  color:var(--paper);font-size:18px;padding:14px 16px;font-family:var(--mono);
}
input.answer:focus{outline:2px solid var(--yellow);border-color:var(--yellow)}
.feedback{
  margin-top:16px;border-radius:12px;padding:14px 16px;font-size:15px;line-height:1.5;
  display:none;animation:pop .15s ease;
}
.feedback.show{display:block}
.feedback.good{background:#1d3a2e;border:1px solid var(--mint)}
.feedback.bad{background:#3a1d26;border:1px solid var(--coral)}
.feedback .zing{font-weight:800;display:block;margin-bottom:4px}
.feedback .why{color:#d8d2e8;font-size:14px}
.feedback .ex{font-family:var(--mono);font-size:13px;color:var(--cyan);display:block;margin-top:6px}
.combo{
  position:fixed;top:18px;right:18px;font-family:var(--display);color:var(--yellow);
  font-size:26px;transform:rotate(6deg);text-shadow:0 2px 0 #000;pointer-events:none;display:none;
}
.meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:14px}

/* ---------- summary / stats ---------- */
.bigscore{font-family:var(--display);font-size:64px;color:var(--yellow);line-height:1}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
.stat{background:var(--panel);border:1px solid #352e4e;border-radius:14px;padding:14px}
.stat .n{font-family:var(--display);font-size:26px;color:var(--yellow)}
.stat .l{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-top:4px}
.mastery{margin:8px 0}
.mastery .label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.mastery .track{height:7px;background:var(--panel2);border-radius:99px;overflow:hidden}
.mastery .track>div{height:100%;background:var(--mint)}
.weak{font-size:14px;color:var(--dim);line-height:1.7}
.weak b{color:var(--coral)}
h3.sec{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:26px 0 10px;border-bottom:1px solid #352e4e;padding-bottom:6px}
.note{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:20px}
.note code{font-family:var(--mono);color:var(--cyan)}
.feedback .eslink{font-family:var(--mono);font-size:11px;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline;padding:6px 0 0;display:block}
.feedback .es{font-family:var(--mono);font-size:12px;color:var(--dim);margin-top:6px}
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--yellow);color:#16131f;font-family:var(--mono);font-weight:700;
  padding:10px 18px;border-radius:99px;font-size:13px;display:none;z-index:9;
}
@media (max-width:600px){
  .opt{padding:16px;font-size:17px}
  .opt kbd{display:none}
  .qtext{font-size:19px}
  .btn{padding:15px 20px}
  .mode{padding:20px}
  input.answer{font-size:17px;padding:16px}
  .hud{font-size:11px;gap:6px}
  .hud .chip{padding:6px 10px}
}
#installBtn{display:none}
.hearbtn{
  font-family:var(--mono);font-size:13px;font-weight:700;color:var(--cyan);
  background:rgba(92,200,255,.08);border:1px solid #2f5a6e;border-radius:10px;
  padding:9px 14px;margin:0 0 16px;cursor:pointer;display:inline-block;
}
.hearbtn:hover{background:rgba(92,200,255,.16)}
.hearbtn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
</style>
</head>
<body>
<div class="combo" id="combo"></div>
<div class="toast" id="toast"></div>
<div id="app"></div>

["___ she working on the brand today?",["Is","Does","Do","Has"],0,"Continuous yes/no → be (is/are) + subject + -ing.","Is she coming? Are they ready?"],
["You finished the logo, ___",["didn't you?","don't you?","haven't you?","isn't it?"],0,"Positive statement → NEGATIVE tag, matching tense: 'finished' → didn't you.","You sent it, didn't you?"],
["She's a great illustrator, ___",["isn't she?","doesn't she?","is she?","isn't it?"],0,"'She is' → tag 'isn't she?'. Match the verb and the subject pronoun.","He's late, isn't he?"],
["They aren't coming, ___",["are they?","aren't they?","do they?","isn't it?"],0,"NEGATIVE statement → POSITIVE tag: 'aren't' → 'are they?'","You don't mind, do you?"],
["Let's start the review, ___",["shall we?","will we?","don't we?","do we?"],0,"'Let's...' takes the special tag 'shall we?'","Let's grab coffee, shall we?"],
["You can drive, ___",["can't you?","don't you?","can you?","aren't you?"],0,"Modal 'can' → tag 'can't you?'","He should know, shouldn't he?"],
["He doesn't like the color, ___",["does he?","doesn't he?","is he?","do he?"],0,"Negative 'doesn't' → POSITIVE tag 'does he?'","She didn't reply, did she?"],
["Can you tell me ___?",["where is the file","where the file is","where's the file at","is the file where"],1,"EMBEDDED question: NO inversion. 'where the file is', not 'where is the file'.","I don't know where it is."],
["I'm not sure ___ the deadline is.",["when","when is","what when","that when"],0,"Embedded: WH-word + subject + verb. 'when the deadline is' — no inversion.","Do you know when it starts?"],
["Do you know ___?",["what time is it","what time it is","is what time it","what is it time"],1,"Embedded keeps statement order: 'what time it is', not 'what time is it'.","Tell me what time it is."],
["She asked me ___ I was free on Friday.",["that","if","what","is"],1,"Embedded yes/no question uses 'if' or 'whether' + statement order.","He asked whether I had finished."]

const SUBJUNCTIVE=[
["The client insists that the logo ___ blue.",["is","be","was","being"],1,"Mandative subjunctive: after insist/suggest/demand + that, use the BASE verb for every subject: 'that the logo be blue'.","I demand that he be on time."],
["I suggest that she ___ the deadline this time.",["meets","meet","met","meeting"],1,"After 'suggest that' → base verb, no -s: 'that she meet'.","We recommend that he meet the team."],

// CLEFT SENTENCES — emphasis structures. [prompt, options, answerIdx, why, example]
const CLEFT=[
["Which one is a cleft sentence (used for emphasis)?",["I lost the file yesterday.","It was yesterday that I lost the file.","Yesterday, I lost the file.","I yesterday lost the file."],1,"A cleft splits one idea into two clauses to spotlight a part: 'It was X that...'.","It was the client who chose blue."],
["___ the client who approved it, not me.",["It was","That was","There was","It is was"],0,"It-cleft for emphasis: 'It was + the focused part + who/that...'.","It was Maria who made the call."],
["___ I really need is a week off.",["What","That","It","Which"],0,"Wh-cleft (pseudo-cleft): 'What + clause + is/are + X' pushes the emphasis to the end.","What I want is honest feedback."],
["What this design needs ___ more contrast.",["is","are","be","has"],0,"In a wh-cleft the verb is usually singular 'is': 'What it needs is...'.","What they want is simplicity."],
["All ___ wanted was a clear brief.",["I","that I","which I","I that"],0,"'All (that) I wanted' = the only thing. The 'that' is optional.","All she asked for was time."],
["It's the deadline ___ worries me, not the work.",["what","that","who","which it"],1,"In an it-cleft about a thing, use 'that' (or 'which'): 'It's X that...'.","It's the silence that scares me."],
["___ broke the printer was the new intern.",["What","The one who","Who","That"],1,"A pseudo-cleft can start with 'The one who...' to delay and emphasize the answer.","The one who called was the client."],
["Make it a cleft — 'Tom sent the email.' →",["It was Tom who sent the email.","Tom it was sent the email.","Was Tom who sent the email.","It Tom sent the email."],0,"It-cleft to stress the doer: 'It was Tom who...'.","It was Javi who designed it."],
["The reason ___ I left is the pay.",["why","what","how","which"],0,"'The reason why/that...' is a focus structure that sets up the explanation.","The reason why it failed is clear."],

// ================= STATE / SRS =================
const KEY='javi_english_game_v2';
const INTERVALS=[1,3,7,16,35,90];
function today(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}
let S=load()||{items:{},xp:0,streakDays:0,lastPlay:null,history:[]};
function save(){localStorage.setItem(KEY,JSON.stringify(S))}
function rec(id){if(!S.items[id])S.items[id]={box:-1,due:null,seen:0,ok:0,bad:0};return S.items[id]}
function schedule(id,correct){
  const r=rec(id);
  if(correct){
    const wasOverdue=r.due&&r.due<today()&&r.box>0;
    if(r.box<0)r.box=0; else if(!wasOverdue)r.box=Math.min(r.box+1,5);
    r.ok++;
  }else{ r.box=(r.box>=3)?r.box-2:0; r.bad++; }
  r.seen++;
  r.due=addDays(today(),INTERVALS[Math.max(r.box,0)]);
}
function dueItems(mode){const t=today();return ITEMS.filter(it=>it.mode===mode&&S.items[it.id]&&S.items[it.id].box>=0&&S.items[it.id].due<=t)}
function newItems(mode){return ITEMS.filter(it=>it.mode===mode&&(!S.items[it.id]||S.items[it.id].box<0))}
function touchStreak(){const t=today();if(S.lastPlay===t)return;
  const y=addDays(t,-1);S.streakDays=(S.lastPlay===y)?S.streakDays+1:1;S.lastPlay=t;save();}

// ================= QUESTION GENERATION =================
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function uniq4(arr){return arr.filter((x,i,a)=>a.indexOf(x)===i).slice(0,4)}
function mc(prompt,hint,options,correct,why,ex,tag,es){
  let opts=uniq4(shuffle(options.includes(correct)?options:[correct,...options]));
  if(!opts.includes(correct))opts[Math.floor(Math.random()*opts.length)]=correct;
  return{kind:'mc',prompt,hint,options:shuffle(opts),correct,correctText:correct,why,ex,tag,es};
}
function typed(prompt,hint,answers,why,ex,tag,es){return{kind:'typed',prompt,hint,answers,correctText:answers[0],why,ex,tag,es}}

function verbQ(it){
  const[b,p,pp,def,es,ex]=it.d;const seen=rec(it.id).seen;
  const other=()=>pick(VERBS.filter(v=>v[0]!==b));
  const reg=(b.endsWith('e')?b+'d':b+'ed');
  const forms=`<b>${b}</b> · <span class="filled">${p}</span> · <span class="filled">${pp}</span>`;
  let q;
  if(seen===0) q=mc(`Past simple of <b>${b}</b>`,def,[p,reg,other()[1],pp!==p?pp:other()[2]],p,
    `${b} → <b>${p}</b> → ${pp}. <i>${def}</i>`,ex,'IRREGULAR VERB',es);
  else if(seen===1) q=mc(`Past participle of <b>${b}</b>`,`${def} — the form after have / has / had`,[pp,reg,p!==pp?p:other()[2],other()[2]],pp,
    `${b} → ${p} → <b>${pp}</b>`,ex,'IRREGULAR VERB',es);
  else if(seen%2===0) q=typed(`Type the <b>past simple</b> of "${b}"`,def,p.split('/'),
    `${b} → <b>${p}</b> → ${pp}`,ex,'PRODUCTION — type from memory',es);
  else q=typed(`Type the <b>past participle</b> of "${b}"`,`${def} — used with have / has / had`,pp.split('/'),
    `${b} → ${p} → <b>${pp}</b>`,ex,'PRODUCTION — type from memory',es);
  q.completed=forms+` &nbsp;<span style="color:var(--dim);font-size:15px">${def}</span>`;
  return q;
}
function gapQ(it,pool,label){
  const[v,def,es,blank,ex]=it.d;const seen=rec(it.id).seen;
  const others=pool.filter(x=>x[0]!==v);
  let q;
  if(seen===0) q=mc(`What does <b>${v}</b> mean?`,`"${ex}"`,[def,pick(others)[1],pick(others)[1],pick(others)[1]],def,
    `<b>${v}</b> — ${def}`,ex,label,es);
  else if(seen<=2) q=mc(blank.replace(/___/g,'<span class="blank">_____</span>'),def,[v,pick(others)[0],pick(others)[0],pick(others)[0]],v,
    `<b>${v}</b> — ${def}`,ex,label,es);
  else q=typed(blank.replace(/___/g,'<span class="blank">_____</span>'),`Type the missing words — ${def}`,[v],
    `<b>${v}</b> — ${def}`,ex,'PRODUCTION — type from memory',es);
  q.completed=`<span class="filled">${v}</span> &nbsp;<span style="color:var(--dim);font-size:15px">${def}</span>`;
  return q;
}
function prepQ(it){
  const[sent,correct,why,es,cat]=it.d;
  return mc(sent.replace(/___/g,'<span class="blank">_____</span>'),null,['in','on','at','by'],correct,why,sent.replace('___',correct),cat,es);
}
function prepXQ(it){
  const[sent,correct,distractors,why,es,cat]=it.d;
  return mc(sent.replace(/___/g,'<span class="blank">_____</span>'),null,[correct,...distractors],correct,why,sent.replace('___',correct),'PREPOSITION · '+cat,es);
}
function tenseQ(it){
  const t=it.d;const q=pick(t.qs);
  return mc(q[0].replace(/___/g,'<span class="blank">_____</span>'),`Hint: signals like “${t.sig}”`,q[2],q[1],
    `<b>${t.n}</b> — ${t.s}. Use: ${t.u}.`,q[0].replace('___',q[1]),'TENSE MACHINE');
}
// Generic MC-from-set generator (Zona Roja, Question Formation, Subjunctive, Cleft)
function setQ(it,tag){
  const[q,opts,a,why,ex]=it.d;
  const hasBlank=/___/.test(q);
  const m=mc(q.replace(/___/g,'<span class="blank">_____</span>'),null,opts,opts[a],why,ex,tag);
  if(!hasBlank) m.completed=`${q} &nbsp;→&nbsp; <span class="filled">${m.correctText}</span>`;
  return m;
}
function vocabQ(it){
  const[w,def,es,ex]=it.d;const seen=rec(it.id).seen;
  const others=VOCAB.filter(x=>x[0]!==w);
  let q;
  if(seen===0) q=mc(`What does <b>${w}</b> mean?`,`"${ex}"`,[def,pick(others)[1],pick(others)[1],pick(others)[1]],def,
    `<b>${w}</b> — ${def}`,ex,'WORD BANK',es);
  else if(seen===1) q=mc(`Which word means: <i>${def}</i>`,null,[w,pick(others)[0],pick(others)[0],pick(others)[0]],w,
    `<b>${w}</b> — ${def}`,ex,'WORD BANK',es);
  else q=typed(`Type the word that means: <i>${def}</i>`,`"${ex.replace(new RegExp(w,'i'),'____')}"`,[w],
    `<b>${w}</b> — ${def}`,ex,'PRODUCTION — type from memory',es);
  q.say=w;
  q.completed=`<span class="filled">${w}</span> &nbsp;<span style="color:var(--dim);font-size:15px">${def}</span>`;
  return q;
}
function makeQ(it){
  let q;
  if(it.mode==='verbs')q=verbQ(it);
  else if(it.mode==='phrasals')q=gapQ(it,PHRASALS,'PHRASAL VERB');
  else if(it.mode==='expr')q=gapQ(it,EXPR_POOL,'EXPRESSION');
  else if(it.mode==='preps')q=(it.sub==='x')?prepXQ(it):prepQ(it);
  else if(it.mode==='vocab')q=vocabQ(it);
  else if(it.mode==='questions')q=setQ(it,'QUESTION FORMATION');
  else if(it.mode==='subjunctive')q=setQ(it,'SUBJUNCTIVE MOOD');
  else if(it.mode==='cleft')q=setQ(it,'CLEFT — emphasis structure');
  else if(it.mode==='tenses')q=tenseQ(it);
  else q=setQ(it,'ZONA ROJA — your own logged mistakes');
  q.itemId=it.id;
  return q;
}

const app=document.getElementById('app');
let session=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2200)}

function header(){
  const L=levelInfo();
  return `<header>
    <div class="logo">LOCO<em>VERB</em><small>JAVI'S ENGLISH GYM — BOGOTÁ EDITION</small></div>
    <div class="hud">
      <div class="chip">XP <b>${S.xp}</b></div>
      <div class="chip">LVL ${L.lvl+1} · <b>${L.name}</b></div>
      <div class="chip">STREAK <b>${S.streakDays}d</b></div>
    </div></header>`;
}
function home(){
  session=null;document.onkeydown=null;
  const cards=Object.keys(MODES).map(m=>{
    const due=dueItems(m).length,nu=newItems(m).length,M=MODES[m];
    return `<button class="mode ${m==='roja'?'red':''}" onclick="startRound('${m}')">
      <span class="stamp">${M.stamp}</span>
      <h2>${M.title}</h2><p>${M.desc}</p>
      <span class="due">${due?`<b>${due} due for review</b> · `:''}<i>${nu} new waiting</i></span>
    </button>`}).join('');
  const totalDue=Object.keys(MODES).reduce((n,m)=>n+dueItems(m).length,0);
  app.innerHTML=header()+
    (totalDue?`<p style="font-family:var(--mono);font-size:13px;color:var(--coral);margin-bottom:14px">⏰ ${totalDue} items due — spaced repetition only works if you show up. Review first, new stuff after.</p>`:'')+
    `<div class="grid">${cards}</div>
     <div class="row"><button class="btn ghost" onclick="statsScreen()">My progress</button>
       <button class="btn" id="installBtn" onclick="doInstall()">Install app</button></div>
     <p class="note">Progress saves automatically in this browser (<code>localStorage</code>). Browsers can’t write to a folder on their own, so use <b>My progress → Export</b> to download a backup <code>.json</code> for this folder. Definitions are in English by design; tap <b>“ES”</b> under any answer only if a definition fails you.</p>`;
}
function startRound(mode){
  touchStreak();
  let queue=shuffle(dueItems(mode));
  const fresh=shuffle(newItems(mode)).slice(0,Math.max(0,10-Math.min(queue.length,10)));
  queue=[...queue.slice(0,14),...fresh].slice(0,14);
  if(!queue.length){toast('Nothing due and nothing new here. Go live your life.');return}
  session={mode,queue,idx:0,ok:0,total:0,combo:0,best:0,retries:{},results:[]};
  renderQ();
}
function renderQ(){
  const s=session;
  if(s.idx>=s.queue.length)return summary();
  const it=s.queue[s.idx];
  const q=makeQ(it);s.current=q;
  const prog=Math.round(100*s.idx/s.queue.length);
  let body='';
  if(q.kind==='mc'){
    body=`<div class="opts">`+q.options.map((o,i)=>
      `<button class="opt" data-i="${i}" onclick="answerMC(${i})"><kbd>${i+1}</kbd><span>${o}</span></button>`).join('')+`</div>`;
  }else{
    body=`<input class="answer" id="ans" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type your answer + Enter">
          <div class="row"><button class="btn" onclick="answerTyped()">Check</button></div>`;
  }
  app.innerHTML=header()+
   `<div class="bar"><div style="width:${prog}%"></div></div>
    <div class="qcard">
      <div class="qtag">${q.tag} · ${s.idx+1}/${s.queue.length}</div>
      <div class="qtext">${q.prompt}</div>
      ${q.hint?`<div class="qhint">${q.hint}</div>`:''}
      ${q.say?`<button class="hearbtn" onclick="sayIt('${q.say.replace(/'/g,"\\'")}')">🔊 Hear it &amp; shadow</button>`:''}
      ${body}
      <div class="feedback" id="fb"></div>
      <div class="meta"><span>combo ×${s.combo}</span><button class="btn small ghost" onclick="home()">quit round</button></div>
    </div>`;
  const inp=document.getElementById('ans');
  if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')answerTyped()})}
  document.onkeydown=(e)=>{
    if(s.answered&&(e.key==='Enter'||e.key===' ')){e.preventDefault();next();return}
    if(q.kind==='mc'&&!s.answered&&['1','2','3','4'].includes(e.key)){const i=+e.key-1;if(i<q.options.length)answerMC(i)}
  };
}
function grade(correct){
  const s=session,q=s.current;
  s.answered=true;s.total++;
  const fb=document.getElementById('fb');
  const esLine=q.es?`<button class="eslink" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">show ES fallback</button><span class="es" style="display:none">🇪🇸 ${q.es}</span>`:'';
  if(correct){
    s.ok++;s.combo++;s.best=Math.max(s.best,s.combo);
    const gain=10+Math.min(s.combo,5)*2;S.xp+=gain;
    fb.className='feedback good show';
    fb.innerHTML=`<span class="zing">✔ ${pick(PRAISE)} +${gain} XP</span><span class="why">${q.why}</span><span class="ex">“${q.ex}”</span>${esLine}`;
    if(s.combo>=3){const c=document.getElementById('combo');c.textContent='COMBO ×'+s.combo;c.style.display='block';setTimeout(()=>c.style.display='none',900)}
  }else{
    s.combo=0;
    fb.className='feedback bad show';
    const right=q.kind==='mc'?q.correct:q.answers.join(' / ');
    fb.innerHTML=`<span class="zing">✘ ${pick(ROAST)}</span><span class="why">Correct: <b>${right}</b> — ${q.why}</span><span class="ex">“${q.ex}”</span>${esLine}`;
    const id=q.itemId;
    if(!s.retries[id]){s.retries[id]=1;s.queue.push(it_of(id))}
  }
  schedule(q.itemId,correct);
  s.results.push({id:q.itemId,ok:correct});
  save();
  // Show the completed question at the top: fill the blank with the answer, sitting on a line
  const qt=document.querySelector('.qtext');
  if(qt){
    if(/<span class="blank">/.test(q.prompt)){
      const parts=String(q.correctText).split(' / ');let bi=0;
      qt.innerHTML=q.prompt.replace(/<span class="blank">_+<\/span>/g,()=>{
        const val=(bi<parts.length)?parts[bi]:parts[parts.length-1];bi++;
        return `<span class="filled">${val}</span>`;
      });
    }else if(q.completed){
      qt.innerHTML=q.completed;
    }
  }
  const meta=document.querySelector('.meta');
  meta.innerHTML=`<span>combo ×${s.combo}</span><button class="btn small" onclick="next()">Next ⏎</button>`;
}
function it_of(id){return ITEMS.find(x=>x.id===id)}
function answerMC(i){
  const s=session,q=s.current;if(s.answered)return;
  const correct=q.options[i]===q.correct;
  document.querySelectorAll('.opt').forEach((b,bi)=>{
    b.disabled=true;
    if(q.options[bi]===q.correct)b.classList.add('right');
    else if(bi===i&&!correct)b.classList.add('wrong');
  });
  grade(correct);
}
function answerTyped(){
  const s=session,q=s.current;if(s.answered)return;
  const v=(document.getElementById('ans').value||'').trim().toLowerCase();
  if(!v)return;
  const ok=q.answers.some(a=>a.trim().toLowerCase()===v);
  grade(ok);
}
function next(){session.answered=false;session.idx++;renderQ()}
function summary(){
  const s=session;document.onkeydown=null;
  const pct=s.total?Math.round(100*s.ok/s.total):0;
  S.history.push({date:today(),mode:s.mode,ok:s.ok,total:s.total,pct});save();
  const verdict=pct>=90?'Too easy. Next round gets harder — the law of desirable difficulty.'
    :pct>=70?'Solid. The misses are already rescheduled to ambush you tomorrow.'
    :pct>=50?'Rough, but this is where learning happens. Errors + retrieval = memory.'
    :'Brutal round. Good news: every miss reset to a 1-day interval. Tomorrow, revenge.';
  app.innerHTML=header()+
   `<div class="qcard" style="text-align:center">
      <div class="qtag">ROUND COMPLETE — ${MODES[s.mode].title}</div>
      <div class="bigscore">${pct}%</div>
      <p style="margin:8px 0 4px">${s.ok}/${s.total} correct · best combo ×${s.best}</p>
      <p class="qhint">${verdict}</p>
      <div class="row" style="justify-content:center">
        <button class="btn" onclick="startRound('${s.mode}')">Another round</button>
        <button class="btn ghost" onclick="home()">Home</button>
      </div></div>`;
}
function statsScreen(){
  const L=levelInfo();
  const mastery=Object.keys(MODES).map(m=>{
    const its=ITEMS.filter(i=>i.mode===m);
    const mature=its.filter(i=>S.items[i.id]&&S.items[i.id].box>=3).length;
    const started=its.filter(i=>S.items[i.id]&&S.items[i.id].box>=0).length;
    const pct=Math.round(100*mature/its.length);
    return `<div class="mastery"><div class="label"><span>${MODES[m].title}</span><span>${started}/${its.length} started · ${pct}% long-term</span></div>
      <div class="track"><div style="width:${pct}%"></div></div></div>`}).join('');
  function lbl(i){return i.mode==='verbs'?i.d[0]:i.mode==='tenses'?i.d.n:i.d[0]}
  const weak=ITEMS.filter(i=>S.items[i.id]&&S.items[i.id].bad>=2)
    .sort((a,b)=>S.items[b.id].bad-S.items[a.id].bad).slice(0,8)
    .map(i=>`<div><b>×${S.items[i.id].bad}</b> ${lbl(i)}</div>`).join('')||'<div>No repeat offenders yet.</div>';
  const last=S.history.slice(-7).reverse().map(h=>`<div>${h.date} · ${MODES[h.mode].title}: <b style="color:var(--mint)">${h.pct}%</b> (${h.ok}/${h.total})</div>`).join('')||'<div>No rounds played yet.</div>';
  app.innerHTML=header()+
   `<div class="statgrid">
      <div class="stat"><div class="n">${S.xp}</div><div class="l">total XP</div></div>
      <div class="stat"><div class="n">${S.streakDays}</div><div class="l">day streak</div></div>
      <div class="stat"><div class="n">${L.name}</div><div class="l">current rank</div></div>
    </div>
    <h3 class="sec">Long-term memory per chapter (items at 16+ day intervals)</h3>${mastery}
    <h3 class="sec">Repeat offenders — your weakest items</h3><div class="weak">${weak}</div>
    <h3 class="sec">Recent rounds (retention %)</h3><div class="weak">${last}</div>
    <div class="row">
      <button class="btn" onclick="exportProgress()">Export progress (.json)</button>
      <button class="btn ghost" onclick="document.getElementById('imp').click()">Import backup</button>
      <button class="btn ghost" onclick="if(confirm('Wipe ALL progress?')){localStorage.removeItem(KEY);location.reload()}">Reset</button>
      <button class="btn ghost" onclick="home()">Home</button>
    </div>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importProgress(event)">
    <p class="note">Export this file into the game’s folder after big sessions — it’s your backup and your progress report. You can paste it to your coach for analysis.</p>`;
}
function exportProgress(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`locoverb_progress_${today()}.json`;a.click();toast('Backup downloaded.');
}
function importProgress(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{S=JSON.parse(r.result);save();toast('Progress restored.');home()}catch(e){toast('That file is not a valid backup.')}};
  r.readAsText(f);
}
// ================= PWA: install + offline =================
let deferredPrompt=null;
function sayIt(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=0.85;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){toast('Speech not available on this browser.');}}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;
  const b=document.getElementById('installBtn');if(b)b.style.display='inline-block';});
function doInstall(){if(!deferredPrompt){toast('Open the browser menu → “Add to Home screen”.');return}
  deferredPrompt.prompt();deferredPrompt.userChoice.finally(()=>{deferredPrompt=null;
    const b=document.getElementById('installBtn');if(b)b.style.display='none';});}
window.addEventListener('appinstalled',()=>toast('Installed. Open it from your home screen.'));
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
home();


</script>
